<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>Profile - Evolutionary Trading System</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
        /* ============================================ */
        /* RESET & BASE - FIXED FOR MOBILE/DESKTOP MODE*/
        /* ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CRITICAL FIX: Allow natural scrolling, no forced heights */
        html {
            height: auto;
            min-height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0e1a;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            min-height: 100dvh; /* Dynamic viewport height for mobile */
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto; /* Allow scrolling */
            position: relative;
            width: 100%;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 75% 30%, rgba(30, 41, 79, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(13, 27, 42, 0.4) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* ============================================ */
        /* WRAPPER - FLEXIBLE & SCROLLABLE            */
        /* ============================================ */
        .profile-page-wrapper {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Changed from center to flex-start */
            padding: 20px 16px;
            box-sizing: border-box;
            z-index: 1;
            position: relative;
            flex: 1 0 auto;
        }

        /* ============================================ */
        /* TOAST NOTIFICATION                          */
        /* ============================================ */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
            max-width: 90vw;
        }

        .toast {
            background: rgba(19, 26, 46, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-left: 4px solid #00fff2;
            color: #ffffff;
            padding: 14px 20px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            opacity: 0;
            font-size: 0.9rem;
            pointer-events: auto;
            word-break: break-word;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success {
            border-left-color: #00ff88;
            background: rgba(13, 36, 27, 0.95);
        }

        .toast.error {
            border-left-color: #ff3366;
            background: rgba(38, 16, 23, 0.95);
        }

        /* ============================================ */
        /* CONTAINER - RESPONSIVE & FLEXIBLE          */
        /* ============================================ */
        .profile-container {
            width: 100%;
            max-width: 1000px;
            background: rgba(15, 22, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 32px 28px;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 40px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            margin: 0 auto 16px auto;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        /* ============================================ */
        /* SIDEBAR                                     */
        /* ============================================ */
        .profile-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            padding-right: 32px;
            flex-shrink: 0;
        }

        /* ============================================ */
        /* AVATAR - RESPONSIVE SIZING                  */
        /* ============================================ */
        .avatar-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .avatar-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #161b2c;
            border: 3px solid #00fff2;
            box-shadow: 0 0 20px rgba(0, 255, 242, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .avatar-wrapper:hover .avatar-circle {
            transform: scale(1.02);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            font-size: 3.5rem;
            color: #00fff2;
            font-weight: 600;
            text-transform: uppercase;
        }

        .avatar-edit-icon {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #00fff2;
            color: #0b0e1a;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
            box-shadow: 0 4px 12px rgba(0, 255, 242, 0.4);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .avatar-wrapper:hover .avatar-edit-icon {
            transform: scale(1.1);
        }

        .avatar-edit-icon:hover {
            background: #00ccff;
        }

        #avatarInput {
            display: none;
        }

        /* ============================================ */
        /* USER TYPOGRAPHY - RESPONSIVE               */
        /* ============================================ */
        .user-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            margin-bottom: 4px;
            word-break: break-word;
            max-width: 100%;
        }

        .user-role {
            font-size: 0.85rem;
            color: #8fa0dd;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            margin-bottom: 28px;
            word-break: break-word;
        }

        /* ============================================ */
        /* BUTTONS - RESPONSIVE                       */
        /* ============================================ */
        .btn-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
            min-height: 48px;
        }

        .btn-edit {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-edit:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-edit.editing {
            background: #ff3366;
            color: #ffffff;
            border-color: #ff3366;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
        }

        .btn-edit.editing:hover {
            background: #e62254;
            transform: translateY(-2px);
        }

        .btn-save {
            background: linear-gradient(135deg, #00fff2 0%, #00aaff 100%);
            color: #0b0e1a;
            box-shadow: 0 4px 15px rgba(0, 255, 242, 0.2);
            display: none;
        }

        .btn-save:hover {
            box-shadow: 0 6px 20px rgba(0, 255, 242, 0.4);
            transform: translateY(-2px);
        }

        .edit-mode .btn-save {
            display: flex;
        }

        /* ============================================ */
        /* FORM & DATA SECTIONS - RESPONSIVE          */
        /* ============================================ */
        .profile-content {
            display: flex;
            flex-direction: column;
            gap: 28px;
            min-width: 0;
        }

        .section-header {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00fff2;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            opacity: 0.9;
            flex-wrap: wrap;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 28px;
        }

        .full-width {
            grid-column: span 2;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            min-width: 0;
        }

        .field-label {
            font-size: 0.8rem;
            color: #8fa0dd;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .field-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .field-value {
            width: 100%;
            background: rgba(22, 27, 44, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.92rem;
            color: #ffffff;
            transition: all 0.25s ease;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .field-value:disabled {
            background: transparent;
            border-color: transparent;
            padding-left: 0;
            padding-right: 0;
            color: #e2e8f0;
            cursor: default;
        }

        .edit-mode .field-group:not(.password-field) .field-value {
            background: #161b2c;
            border-color: rgba(0, 255, 242, 0.2);
            padding-left: 14px;
            padding-right: 40px;
            cursor: text;
        }

        .edit-mode .field-group:not(.password-field) .field-value:focus {
            border-color: #00fff2;
            box-shadow: 0 0 0 3px rgba(0, 255, 242, 0.15);
            background: #1a2035;
        }

        .field-edit-icon {
            position: absolute;
            right: 12px;
            color: rgba(0, 255, 242, 0.5);
            font-size: 0.85rem;
            display: none;
            pointer-events: none;
        }

        .edit-mode .field-group:not(.password-field):not([data-field="traderType"]) .field-edit-icon {
            display: block;
            pointer-events: auto;
            cursor: pointer;
        }

        .time-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .time-wrapper {
            position: relative;
            flex: 1;
            min-width: 80px;
        }

        .time-wrapper input[type="time"] {
            width: 100%;
            padding-right: 10px;
        }

        .time-wrapper input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .time-wrapper input[type="time"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        .time-wrapper input[type="time"]:disabled::-webkit-calendar-picker-indicator {
            display: none;
        }

        .time-separator {
            color: #8fa0dd;
            font-weight: 500;
            padding: 0 4px;
        }

        .trader-type-display {
            padding: 4px 0;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.retailer {
            background: rgba(0, 255, 242, 0.1);
            color: #00fff2;
            border: 1px solid rgba(0, 255, 242, 0.2);
        }

        .badge.wholesale {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        /* ============================================ */
        /* MODAL - RESPONSIVE                         */
        /* ============================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 15, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: #111625;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            padding: 28px 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #ffffff;
        }

        .modal-close-btn {
            background: transparent;
            border: none;
            color: #8fa0dd;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
            padding: 4px 8px;
        }

        .modal-close-btn:hover {
            color: #ff3366;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .modal-input {
            width: 100%;
            background: #1a1f33;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 11px 14px;
            color: #ffffff;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-input:focus {
            border-color: #00fff2;
        }

        .modal-input:disabled {
            background: rgba(26, 31, 51, 0.4);
            border-color: transparent;
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .btn-modal-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            min-height: 44px;
        }

        .btn-modal-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-modal-save {
            background: linear-gradient(135deg, #00fff2 0%, #00aaff 100%);
            color: #0b0e1a;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 255, 242, 0.15);
            min-height: 44px;
        }

        .btn-modal-save:hover:not(:disabled) {
            box-shadow: 0 4px 16px rgba(0, 255, 242, 0.3);
        }

        .btn-modal-save:disabled {
            background: #252d47;
            color: rgba(255, 255, 255, 0.2);
            box-shadow: none;
            cursor: not-allowed;
        }

        .modal-input.success-input {
            border-color: #00ff88 !important;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
        }

        .modal-input.error {
            border-color: #ff3366 !important;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.2);
        }

        .error-text {
            font-size: 0.8rem;
            color: #ff3366;
            margin-top: -12px;
            display: none;
        }

        .error-text.show {
            display: block;
        }

        /* ============================================ */
        /* FOOTER - FIXED POSITIONING                 */
        /* ============================================ */
        .profile-footer {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 4px 0;
            color: rgba(255, 255, 255, 0.12);
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            background: transparent;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 4px;
        }

        .profile-footer .footer-center {
            text-align: center;
            flex: 1;
            min-width: 100px;
        }

        .profile-footer .footer-right {
            text-align: right;
            font-weight: 500;
            color: rgba(0, 255, 242, 0.15);
            font-size: 0.6rem;
            letter-spacing: 1px;
        }

        /* ============================================ */
        /* RESPONSIVE DESIGN - COMPREHENSIVE          */
        /* ============================================ */
        @media (max-width: 900px) {
            .profile-container {
                grid-template-columns: 1fr;
                gap: 28px;
                padding: 24px 20px;
            }
            .profile-sidebar {
                border-right: none;
                padding-right: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                padding-bottom: 28px;
            }
            .avatar-wrapper {
                width: 130px;
                height: 130px;
            }
            .avatar-placeholder {
                font-size: 3rem;
            }
            .user-name {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 600px) {
            .profile-page-wrapper {
                padding: 12px 10px;
            }
            
            .profile-container {
                padding: 18px 14px;
                border-radius: 16px;
                gap: 20px;
            }
            
            .data-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            
            .full-width {
                grid-column: span 1;
            }
            
            .avatar-wrapper {
                width: 110px;
                height: 110px;
            }
            
            .avatar-placeholder {
                font-size: 2.5rem;
            }
            
            .user-name {
                font-size: 1.1rem;
            }
            
            .user-role {
                font-size: 0.75rem;
                margin-bottom: 20px;
            }
            
            .profile-content {
                gap: 20px;
            }
            
            .section-header {
                font-size: 0.7rem;
                margin-bottom: 12px;
            }
            
            .field-value {
                font-size: 0.85rem;
                padding: 10px 12px;
            }
            
            .btn {
                font-size: 0.85rem;
                padding: 10px 14px;
                min-height: 44px;
            }
            
            .profile-footer {
                font-size: 0.6rem;
                padding: 12px 0 2px 0;
            }
            .profile-footer .footer-center {
                flex: 1 1 100%;
                order: 1;
                margin-top: 2px;
            }
            .profile-footer .footer-right {
                order: 2;
            }
            .profile-footer span:first-child {
                display: none;
            }
            
            .modal-card {
                padding: 20px 16px;
                max-height: 85vh;
            }
            
            .modal-title {
                font-size: 1rem;
            }
            
            .time-inputs {
                flex-wrap: wrap;
            }
            .time-separator {
                width: 100%;
                text-align: center;
                padding: 2px 0;
            }
            .time-wrapper {
                min-width: 60px;
                flex: 1 1 40%;
            }
            
            .toast-container {
                top: 12px;
                right: 12px;
                max-width: 85vw;
            }
            .toast {
                font-size: 0.85rem;
                padding: 12px 16px;
            }
        }

        @media (max-width: 380px) {
            .profile-page-wrapper {
                padding: 8px 6px;
            }
            
            .profile-container {
                padding: 12px 10px;
                border-radius: 12px;
                gap: 16px;
            }
            
            .avatar-wrapper {
                width: 90px;
                height: 90px;
            }
            
            .avatar-placeholder {
                font-size: 2rem;
            }
            
            .user-name {
                font-size: 0.95rem;
            }
            
            .user-role {
                font-size: 0.65rem;
                letter-spacing: 1px;
            }
            
            .btn {
                font-size: 0.8rem;
                padding: 8px 12px;
                min-height: 40px;
                gap: 6px;
            }
            
            .field-value {
                font-size: 0.8rem;
                padding: 8px 10px;
                border-radius: 8px;
            }
            
            .field-label {
                font-size: 0.7rem;
            }
            
            .section-header {
                font-size: 0.65rem;
            }
            
            .data-grid {
                gap: 10px;
            }
            
            .profile-content {
                gap: 16px;
            }
            
            .modal-card {
                padding: 16px 12px;
                border-radius: 16px;
            }
            
            .modal-input {
                font-size: 0.85rem;
                padding: 9px 12px;
            }
            
            .btn-modal-cancel,
            .btn-modal-save {
                font-size: 0.8rem;
                padding: 8px 14px;
                min-height: 38px;
            }
            
            .badge {
                font-size: 0.65rem;
                padding: 4px 10px;
            }
        }

        /* ============================================ */
        /* DESKTOP MODE FIX FOR MOBILE                */
        /* ============================================ */
        /* This ensures content doesn't get squished in desktop mode on phones */
        @media (max-width: 768px) and (min-width: 400px) {
            .profile-container {
                grid-template-columns: 1fr;
                max-width: 100%;
                padding: 20px 16px;
            }
            
            .profile-sidebar {
                border-right: none;
                padding-right: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                padding-bottom: 24px;
            }
            
            .data-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .full-width {
                grid-column: span 2;
            }
        }

        /* Extra fix for very narrow screens in desktop mode */
        @media (max-width: 500px) {
            .data-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
            .profile-sidebar {
                width: 100%;
            }
            .btn-stack {
                max-width: 300px;
                margin: 0 auto;
            }
        }

        /* Prevent content from being too wide on large screens */
        @media (min-width: 1200px) {
            .profile-container {
                padding: 48px 56px;
                gap: 56px;
            }
            .profile-sidebar {
                padding-right: 48px;
            }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="profile-page-wrapper">

        <div class="profile-container" id="profileContainer">
            
            <div class="profile-sidebar">
                <div class="avatar-wrapper" id="avatarWrapper">
                    <div class="avatar-circle" id="avatarCircle"></div>
                    <div class="avatar-edit-icon" id="avatarEditIcon">
                        <i class="fa-solid fa-camera"></i>
                    </div>
                </div>
                <input type="file" id="avatarInput" accept="image/*" />

                <div class="user-name" id="sidebarName">Loading...</div>
                <div class="user-role" id="sidebarRole">Retail Trader</div>

                <div class="btn-stack">
                    <button class="btn btn-edit" id="editToggleBtn">
                        <i class="fa-solid fa-user-pen"></i>
                        <span id="editBtnText">Edit Profile</span>
                    </button>
                    <button class="btn btn-save" id="saveChangesBtn">
                        <i class="fa-solid fa-floppy-disk"></i>
                        <span>Save Changes</span>
                    </button>
                </div>
            </div>

            <div class="profile-content">
                
                <div class="profile-section">
                    <div class="section-header">
                        <i class="fa-solid fa-user"></i> Personal Details
                    </div>
                    <div class="data-grid">
                        <div class="field-group full-width" data-field="fullName">
                            <label class="field-label">
                                <i class="fa-solid fa-user-tag"></i> Full Name
                            </label>
                            <div class="field-input-wrapper">
                                <input type="text" class="field-value" id="inputFullName" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon" data-target="inputFullName"></i>
                            </div>
                        </div>
                        <div class="field-group" data-field="email">
                            <label class="field-label">
                                <i class="fa-solid fa-envelope"></i> Email Address
                            </label>
                            <div class="field-input-wrapper">
                                <input type="email" class="field-value" id="inputEmail" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon" data-target="inputEmail"></i>
                            </div>
                        </div>
                        <div class="field-group password-field">
                            <label class="field-label">
                                <i class="fa-solid fa-lock"></i> Password
                            </label>
                            <div class="field-input-wrapper">
                                <input type="password" class="field-value" value="••••••••••••" disabled />
                                <i class="fa-solid fa-key field-edit-icon" style="display: block; cursor: pointer; pointer-events: auto;" id="openPasswordBtn"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="profile-section">
                    <div class="section-header">
                        <i class="fa-solid fa-briefcase"></i> Business Details
                    </div>
                    <div class="data-grid">
                        <div class="field-group" data-field="companyName">
                            <label class="field-label">
                                <i class="fa-solid fa-building"></i> Company Name
                            </label>
                            <div class="field-input-wrapper">
                                <input type="text" class="field-value" id="inputCompanyName" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon" data-target="inputCompanyName"></i>
                            </div>
                        </div>
                        <div class="field-group" data-field="traderType">
                            <label class="field-label">
                                <i class="fa-solid fa-store"></i> Trader Type
                            </label>
                            <div class="trader-type-display" id="traderTypeDisplay"></div>
                        </div>
                        <div class="field-group">
                            <label class="field-label">
                                <i class="fa-solid fa-clock"></i> Business Hours
                            </label>
                            <div class="time-inputs">
                                <div class="time-wrapper">
                                    <input type="time" class="field-value" id="inputOpeningTime" disabled />
                                </div>
                                <span class="time-separator">to</span>
                                <div class="time-wrapper">
                                    <input type="time" class="field-value" id="inputClosingTime" disabled />
                                </div>
                            </div>
                        </div>
                        <div class="field-group" data-field="phone">
                            <label class="field-label">
                                <i class="fa-solid fa-phone"></i> Phone Number
                            </label>
                            <div class="field-input-wrapper">
                                <input type="tel" class="field-value" id="inputPhone" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon" data-target="inputPhone"></i>
                            </div>
                        </div>
                        <div class="field-group" data-field="whatsapp">
                            <label class="field-label">
                                <i class="fa-brands fa-whatsapp"></i> WhatsApp Number
                            </label>
                            <div class="field-input-wrapper">
                                <input type="tel" class="field-value" id="inputWhatsapp" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon" data-target="inputWhatsapp"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="profile-section">
                    <div class="section-header">
                        <i class="fa-solid fa-location-dot"></i> Location
                    </div>
                    <div class="data-grid">
                        <div class="field-group" data-field="region">
                            <label class="field-label">
                                <i class="fa-solid fa-map"></i> Region
                            </label>
                            <div class="field-input-wrapper">
                                <input type="text" class="field-value" id="inputRegion" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon" data-target="inputRegion"></i>
                            </div>
                        </div>
                        <div class="field-group" data-field="district">
                            <label class="field-label">
                                <i class="fa-solid fa-location-dot"></i> District
                            </label>
                            <div class="field-input-wrapper">
                                <input type="text" class="field-value" id="inputDistrict" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon" data-target="inputDistrict"></i>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <footer class="profile-footer">
            <span></span>
            <span class="footer-center">All right reserved @2026</span>
            <span class="footer-right">v.1</span>
        </footer>

    </div>

    <div class="modal-overlay" id="passwordModal">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title">Change Password</div>
                <button class="modal-close-btn" id="closePasswordX">&times;</button>
            </div>
            <div class="modal-form">
                <div class="field-group">
                    <label class="field-label">Current Password</label>
                    <input type="password" class="modal-input" id="currentPassword" placeholder="Enter current password" />
                </div>
                
                <div class="field-group">
                    <label class="field-label">New Password</label>
                    <input type="password" class="modal-input" id="newPassword" placeholder="Min 8 characters" disabled />
                </div>

                <div class="field-group">
                    <label class="field-label">Confirm New Password</label>
                    <input type="password" class="modal-input" id="confirmPassword" placeholder="Repeat new password" disabled />
                </div>
                <div class="error-text" id="confirmPasswordError">❌ Passwords do not match.</div>

                <div class="modal-actions">
                    <button class="btn-modal-cancel" id="closePasswordCancel">Cancel</button>
                    <button class="btn-modal-save" id="modalSaveBtn" disabled>Update Password</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            let isEditMode = false;
            let isPasswordModalOpen = false;
            let currentPasswordCorrect = false;

            let userData = {
                fullName: 'Mudhihiri M. Selemani',
                email: 'mudhihirjz@trading.com',
                password: 'password123', 
                companyName: 'Mudhihirjz Tech',
                traderType: 'Retailer', 
                openingTime: '08:00',
                closingTime: '17:00',
                phone: '+255 712 345 678',
                whatsapp: '+255 712 345 678',
                region: 'Pwani',
                district: 'Bagamoyo',
                avatarUrl: '' 
            };

            const toastContainer = document.getElementById('toastContainer');
            const profileContainer = document.getElementById('profileContainer');
            const editToggleBtn = document.getElementById('editToggleBtn');
            const editBtnText = document.getElementById('editBtnText');
            const saveChangesBtn = document.getElementById('saveChangesBtn');
            const avatarWrapper = document.getElementById('avatarWrapper');
            const avatarCircle = document.getElementById('avatarCircle');
            const avatarEditIcon = document.getElementById('avatarEditIcon');
            const avatarInput = document.getElementById('avatarInput');
            const sidebarName = document.getElementById('sidebarName');
            const sidebarRole = document.getElementById('sidebarRole');

            const passwordModal = document.getElementById('passwordModal');
            const openPasswordBtn = document.getElementById('openPasswordBtn');
            const closePasswordX = document.getElementById('closePasswordX');
            const closePasswordCancel = document.getElementById('closePasswordCancel');
            const modalSaveBtn = document.getElementById('modalSaveBtn');
            const currentPassword = document.getElementById('currentPassword');
            const newPassword = document.getElementById('newPassword');
            const confirmPassword = document.getElementById('confirmPassword');
            const confirmPasswordError = document.getElementById('confirmPasswordError');

            // Click on edit icon focuses corresponding input
            document.querySelectorAll('.field-edit-icon[data-target]').forEach(icon => {
                icon.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const targetId = this.getAttribute('data-target');
                    const targetInput = document.getElementById(targetId);
                    if (targetInput && !targetInput.disabled) {
                        targetInput.focus();
                    }
                });
            });

            function showToast(message, type = 'success') {
                hideToast(); 
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `<span>${message}</span>`;
                toastContainer.appendChild(toast);
                setTimeout(() => toast.classList.add('show'), 50);
                const autoHideTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400);
                }, 4000);
                toast.dataset.timeoutId = autoHideTimeout;
            }

            function hideToast() {
                const activeToasts = toastContainer.querySelectorAll('.toast');
                activeToasts.forEach(toast => {
                    if (toast.dataset.timeoutId) clearTimeout(parseInt(toast.dataset.timeoutId));
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400);
                });
            }

            function updateFieldsFromData() {
                document.getElementById('inputFullName').value = userData.fullName;
                document.getElementById('inputEmail').value = userData.email;
                document.getElementById('inputCompanyName').value = userData.companyName;
                document.getElementById('inputOpeningTime').value = userData.openingTime;
                document.getElementById('inputClosingTime').value = userData.closingTime;
                document.getElementById('inputPhone').value = userData.phone;
                document.getElementById('inputWhatsapp').value = userData.whatsapp;
                document.getElementById('inputRegion').value = userData.region;
                document.getElementById('inputDistrict').value = userData.district;

                sidebarName.textContent = userData.fullName;
                sidebarRole.textContent = `${userData.traderType} Trader`;

                const badgeContainer = document.getElementById('traderTypeDisplay');
                const badgeClass = userData.traderType.toLowerCase() === 'retailer' ? 'retailer' : 'wholesale';
                badgeContainer.innerHTML = `<span class="badge ${badgeClass}">${userData.traderType}</span>`;
                updateAvatar();
            }

            function updateAvatar() {
                avatarCircle.innerHTML = '';
                if (userData.avatarUrl) {
                    const img = document.createElement('img');
                    img.src = userData.avatarUrl;
                    img.className = 'avatar-img';
                    img.alt = 'Avatar';
                    img.onerror = function() {
                        userData.avatarUrl = '';
                        renderPlaceholderAvatar();
                    };
                    avatarCircle.appendChild(img);
                } else {
                    renderPlaceholderAvatar();
                }
            }

            function renderPlaceholderAvatar() {
                avatarCircle.innerHTML = '';
                const placeholder = document.createElement('div');
                placeholder.className = 'avatar-placeholder';
                if (userData.fullName) {
                    const parts = userData.fullName.trim().split(/\s+/);
                    placeholder.textContent = parts.length > 1 ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase() : parts[0][0].toUpperCase();
                } else {
                    placeholder.textContent = 'U';
                }
                avatarCircle.appendChild(placeholder);
            }

            function toggleEditMode() {
                isEditMode = !isEditMode;
                if (isEditMode) {
                    profileContainer.classList.add('edit-mode');
                    editToggleBtn.classList.add('editing');
                    editBtnText.textContent = 'Cancel Edit';
                    document.querySelectorAll('.field-group:not(.password-field) .field-value').forEach(input => input.disabled = false);
                    avatarEditIcon.style.display = 'flex';
                    showToast('✏️ Edit mode activated.', 'success');
                } else {
                    updateFieldsFromData();
                    profileContainer.classList.remove('edit-mode');
                    editToggleBtn.classList.remove('editing');
                    editBtnText.textContent = 'Edit Profile';
                    document.querySelectorAll('.field-group:not(.password-field) .field-value').forEach(input => input.disabled = true);
                    avatarEditIcon.style.display = 'none';
                }
            }

            function saveProfileChanges() {
                const newData = {
                    fullName: document.getElementById('inputFullName').value,
                    email: document.getElementById('inputEmail').value,
                    phone: document.getElementById('inputPhone').value,
                    whatsapp: document.getElementById('inputWhatsapp').value,
                    companyName: document.getElementById('inputCompanyName').value,
                    region: document.getElementById('inputRegion').value,
                    district: document.getElementById('inputDistrict').value,
                    openingTime: document.getElementById('inputOpeningTime').value,
                    closingTime: document.getElementById('inputClosingTime').value
                };

                if (!newData.fullName.trim() || !newData.email.trim() || !newData.phone.trim() || !newData.whatsapp.trim() || !newData.companyName.trim() || !newData.region.trim() || !newData.district.trim()) {
                    showToast('⚠️ All fields are required.', 'error');
                    return;
                }
                if (newData.openingTime >= newData.closingTime) {
                    showToast('⚠️ Closing time must be after opening time.', 'error');
                    return;
                }

                userData = { ...userData, ...newData };
                isEditMode = true;
                toggleEditMode();
                showToast('💾 Profile saved successfully!', 'success');
            }

            function openPasswordModal() {
                isPasswordModalOpen = true;
                passwordModal.classList.add('active');
                currentPassword.value = ''; 
                newPassword.value = ''; 
                confirmPassword.value = '';
                currentPassword.className = 'modal-input'; 
                newPassword.className = 'modal-input'; 
                confirmPassword.className = 'modal-input';
                newPassword.disabled = true; 
                confirmPassword.disabled = true; 
                modalSaveBtn.disabled = true;
                confirmPasswordError.classList.remove('show');
                currentPasswordCorrect = false;
                setTimeout(() => currentPassword.focus(), 100);
            }

            function closePasswordModal() {
                isPasswordModalOpen = false;
                passwordModal.classList.remove('active');
                currentPasswordCorrect = false;
                currentPassword.className = 'modal-input'; 
                newPassword.className = 'modal-input'; 
                confirmPassword.className = 'modal-input';
                newPassword.disabled = true; 
                confirmPassword.disabled = true; 
                modalSaveBtn.disabled = true;
                confirmPasswordError.classList.remove('show');
            }

            function checkPasswordsMatch() {
                const newPwd = newPassword.value;
                const confirmPwd = confirmPassword.value;
                
                if (confirmPwd.length > 0 && newPwd !== confirmPwd) {
                    confirmPasswordError.textContent = "❌ Passwords do not match.";
                    confirmPasswordError.classList.add('show');
                    confirmPassword.className = 'modal-input error';
                    newPassword.className = 'modal-input error';
                    modalSaveBtn.disabled = true;
                } else if (newPwd.length > 0 && newPwd.length < 8) {
                    confirmPasswordError.textContent = "❌ New password must be at least 8 characters.";
                    confirmPasswordError.classList.add('show');
                    newPassword.className = 'modal-input error';
                    confirmPassword.className = 'modal-input error';
                    modalSaveBtn.disabled = true;
                } else if (newPwd.length >= 8 && newPwd === confirmPwd && currentPasswordCorrect) {
                    confirmPasswordError.classList.remove('show');
                    confirmPassword.className = 'modal-input success-input';
                    newPassword.className = 'modal-input success-input';
                    modalSaveBtn.disabled = false;
                } else {
                    confirmPasswordError.classList.remove('show');
                    modalSaveBtn.disabled = true;
                }
            }

            editToggleBtn.addEventListener('click', toggleEditMode);
            saveChangesBtn.addEventListener('click', saveProfileChanges);

            avatarWrapper.addEventListener('click', () => { if (isEditMode) avatarInput.click(); });
            avatarInput.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) { 
                        showToast('⚠️ Less than 2MB allowed.', 'error'); 
                        return; 
                    }
                    const reader = new FileReader();
                    reader.onload = function(e) { 
                        userData.avatarUrl = e.target.result; 
                        updateAvatar(); 
                    };
                    reader.readAsDataURL(file);
                }
            });

            openPasswordBtn.addEventListener('click', openPasswordModal);
            closePasswordX.addEventListener('click', closePasswordModal);
            closePasswordCancel.addEventListener('click', closePasswordModal);
            modalSaveBtn.addEventListener('click', function() {
                if (currentPasswordCorrect && newPassword.value.length >= 8 && newPassword.value === confirmPassword.value) {
                    userData.password = newPassword.value; 
                    closePasswordModal(); 
                    showToast('🔑 Password updated!', 'success');
                }
            });

            currentPassword.addEventListener('input', function() {
                if (this.value === userData.password) {
                    currentPasswordCorrect = true; 
                    this.className = 'modal-input success-input';
                    newPassword.disabled = false; 
                    confirmPassword.disabled = false;
                    checkPasswordsMatch();
                } else {
                    currentPasswordCorrect = false; 
                    this.className = 'modal-input';
                    newPassword.disabled = true; 
                    confirmPassword.disabled = true; 
                    modalSaveBtn.disabled = true;
                    confirmPasswordError.classList.remove('show');
                }
            });

            newPassword.addEventListener('input', checkPasswordsMatch);
            confirmPassword.addEventListener('input', checkPasswordsMatch);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (isPasswordModalOpen) {
                        closePasswordModal();
                    } else if (isEditMode) {
                        toggleEditMode();
                    }
                }
            });

            window.addEventListener('DOMContentLoaded', updateFieldsFromData);
        })();
    </script>
</body>
</html>
