<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Evolutionary Trading System</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
        /* ============================================ */
        /* RESET & BASE                                */
        /* ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0e1a;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 75% 30%, rgba(30, 41, 79, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(13, 27, 42, 0.4) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        /* ============================================ */
        /* TOAST NOTIFICATION                          */
        /* ============================================ */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .toast {
            background: rgba(19, 26, 46, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-left: 4px solid #00fff2;
            color: #ffffff;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            opacity: 0;
            font-size: 0.95rem;
            max-width: 380px;
            pointer-events: auto;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success {
            border-left-color: #00ff88;
            background: rgba(13, 36, 27, 0.95);
        }

        .toast.error {
            border-left-color: #ff3366;
            background: rgba(38, 16, 23, 0.95);
        }

        /* ============================================ */
        /* CONTAINER & LAYOUT                          */
        /* ============================================ */
        .profile-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1000px;
            background: rgba(15, 22, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 40px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 48px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Custom Scrollbar for Container */
        .profile-container::-webkit-scrollbar {
            width: 6px;
        }
        .profile-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .profile-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .profile-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Left Column: Sidebar */
        .profile-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            padding-right: 40px;
        }

        /* Right Column: Content */
        .profile-content {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* ============================================ */
        /* AVATAR STYLE                                */
        /* ============================================ */
        .avatar-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin-bottom: 24px;
            cursor: pointer;
        }

        .avatar-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #161b2c;
            border: 3px solid #00fff2;
            box-shadow: 0 0 20px rgba(0, 255, 242, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .avatar-wrapper:hover .avatar-circle {
            transform: scale(1.02);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            font-size: 4rem;
            color: #00fff2;
            font-weight: 600;
            text-transform: uppercase;
        }

        .avatar-edit-icon {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #00fff2;
            color: #0b0e1a;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(0, 255, 242, 0.4);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .avatar-wrapper:hover .avatar-edit-icon {
            transform: scale(1.1);
        }

        .avatar-edit-icon:hover {
            background: #00ccff;
        }

        /* Hidden File Input */
        #avatarInput {
            display: none;
        }

        /* ============================================ */
        /* USER TYPOGRAPHY                            */
        /* ============================================ */
        .user-name {
            font-size: 1.6rem;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .user-role {
            font-size: 0.95rem;
            color: #8fa0dd;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            margin-bottom: 32px;
        }

        /* ============================================ */
        /* ACTION BUTTONS                              */
        /* ============================================ */
        .btn-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .btn-edit {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-edit:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-edit.editing {
            background: #ff3366;
            color: #ffffff;
            border-color: #ff3366;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
        }

        .btn-edit.editing:hover {
            background: #e62254;
        }

        .btn-save {
            background: linear-gradient(135deg, #00fff2 0%, #00aaff 100%);
            color: #0b0e1a;
            box-shadow: 0 4px 15px rgba(0, 255, 242, 0.2);
            display: none;
        }

        .btn-save:hover {
            box-shadow: 0 6px 20px rgba(0, 255, 242, 0.4);
            transform: translateY(-2px);
        }

        .edit-mode .btn-save {
            display: flex;
        }

        /* ============================================ */
        /* FORM & DATA SECTIONS                        */
        /* ============================================ */
        .section-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00fff2;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            opacity: 0.9;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px 32px;
        }

        .full-width {
            grid-column: span 2;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .field-label {
            font-size: 0.85rem;
            color: #8fa0dd;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .field-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-value {
            width: 100%;
            background: rgba(22, 27, 44, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 0.98rem;
            color: #ffffff;
            transition: all 0.25s ease;
            outline: none;
            -webkit-appearance: none;
        }

        .field-value:disabled {
            background: transparent;
            border-color: transparent;
            padding-left: 0;
            padding-right: 0;
            color: #e2e8f0;
            cursor: default;
        }

        /* Edit Mode Input Styles */
        .edit-mode .field-group:not(.password-field) .field-value {
            background: #161b2c;
            border-color: rgba(0, 255, 242, 0.2);
            padding-left: 16px;
            cursor: text;
        }

        .edit-mode .field-group:not(.password-field) .field-value:focus {
            border-color: #00fff2;
            box-shadow: 0 0 0 3px rgba(0, 255, 242, 0.15);
            background: #1a2035;
        }

        /* Edit Indicator Icons */
        .field-edit-icon {
            position: absolute;
            right: 16px;
            color: rgba(0, 255, 242, 0.5);
            font-size: 0.9rem;
            display: none;
            pointer-events: none;
        }

        .edit-mode .field-group:not(.password-field):not([data-field="traderType"]) .field-edit-icon {
            display: block;
        }

        /* Custom Time Input Styles */
        .time-inputs {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .time-wrapper {
            position: relative;
            flex: 1;
        }

        .time-wrapper input[type="time"] {
            width: 100%;
        }

        .time-wrapper input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .time-wrapper input[type="time"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        .time-wrapper input[type="time"]:disabled::-webkit-calendar-picker-indicator {
            display: none;
        }

        .time-separator {
            color: #8fa0dd;
            font-weight: 500;
        }

        /* Trader Type Badge */
        .trader-type-display {
            padding: 4px 0;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.retailer {
            background: rgba(0, 255, 242, 0.1);
            color: #00fff2;
            border: 1px solid rgba(0, 255, 242, 0.2);
        }

        .badge.wholesale {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        /* ============================================ */
        /* MODAL (PASSWORD EXPANSION)                  */
        /* ============================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 15, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: #111625;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
        }

        .modal-close-btn {
            background: transparent;
            border: none;
            color: #8fa0dd;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close-btn:hover {
            color: #ff3366;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal-input {
            width: 100%;
            background: #1a1f33;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 12px 14px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-input:focus {
            border-color: #00fff2;
        }

        .modal-input:disabled {
            background: rgba(26, 31, 51, 0.4);
            border-color: transparent;
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-modal-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
        }

        .btn-modal-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-modal-save {
            background: linear-gradient(135deg, #00fff2 0%, #00aaff 100%);
            color: #0b0e1a;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 255, 242, 0.15);
        }

        .btn-modal-save:hover:not(:disabled) {
            box-shadow: 0 4px 16px rgba(0, 255, 242, 0.3);
        }

        .btn-modal-save:disabled {
            background: #252d47;
            color: rgba(255, 255, 255, 0.2);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Validation Border Colors */
        .modal-input.success-input {
            border-color: #00ff88 !important;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
        }

        .modal-input.error {
            border-color: #ff3366 !important;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.2);
        }

        .error-text {
            font-size: 0.8rem;
            color: #ff3366;
            margin-top: -14px;
            display: none;
        }

        .error-text.show {
            display: block;
        }

        /* ============================================ */
        /* FOOTER - Static bottom                      */
        /* ============================================ */
        .profile-footer {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 40px 12px 40px;
            margin-top: 16px;
            flex-shrink: 0;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            background: transparent;
            position: relative;
            z-index: 2;
        }

        .profile-footer .footer-center {
            text-align: center;
            flex: 1;
        }

        .profile-footer .footer-right {
            text-align: right;
            font-weight: 500;
            color: rgba(0, 255, 242, 0.2);
            font-size: 0.65rem;
            letter-spacing: 1px;
        }

        /* ============================================ */
        /* RESPONSIVE DESIGN                           */
        /* ============================================ */
        @media (max-width: 900px) {
            .profile-container {
                grid-template-columns: 1fr;
                gap: 32px;
                padding: 24px;
                max-height: 85vh;
            }
            .profile-sidebar {
                border-right: none;
                padding-right: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                padding-bottom: 32px;
            }
            .profile-footer {
                padding: 12px 24px 8px 24px;
                max-width: 100%;
            }
        }

        @media (max-width: 600px) {
            .data-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
            .profile-container {
                padding: 16px;
                max-height: 80vh;
                border-radius: 16px;
            }
            .profile-footer {
                padding: 10px 16px 6px 16px;
                font-size: 0.6rem;
                flex-wrap: wrap;
                gap: 4px;
            }
            .profile-footer .footer-center {
                flex: 1 1 100%;
                order: 1;
            }
            .profile-footer .footer-right {
                order: 2;
            }
            .profile-footer span:first-child {
                display: none;
            }
        }

        @media (max-width: 380px) {
            .avatar-wrapper {
                width: 120px;
                height: 120px;
            }
            .avatar-placeholder {
                font-size: 3rem;
            }
            .user-name {
                font-size: 1.2rem;
            }
            .user-role {
                font-size: 0.8rem;
            }
            .profile-container {
                padding: 12px;
                border-radius: 12px;
            }
            .time-inputs {
                flex-wrap: wrap;
            }
            .time-separator {
                width: 100%;
                text-align: center;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            body::before {
                animation: none !important;
            }
            .toast {
                transition: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="profile-page" style="width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; height:100dvh; padding:20px; box-sizing:border-box; z-index:1; position:relative; overflow-y:auto;">

        <div class="profile-container" id="profileContainer">
            
            <div class="profile-sidebar">
                <div class="avatar-wrapper" id="avatarWrapper">
                    <div class="avatar-circle" id="avatarCircle">
                        </div>
                    <div class="avatar-edit-icon" id="avatarEditIcon">
                        <i class="fa-solid fa-camera"></i>
                    </div>
                </div>
                <input type="file" id="avatarInput" accept="image/*" />

                <div class="user-name" id="sidebarName">Loading...</div>
                <div class="user-role" id="sidebarRole">Retail Trader</div>

                <div class="btn-stack">
                    <button class="btn btn-edit" id="editToggleBtn">
                        <i class="fa-solid fa-user-pen"></i>
                        <span id="editBtnText">Edit Profile</span>
                    </button>
                    <button class="btn btn-save" id="saveChangesBtn" data-saved="false">
                        <i class="fa-solid fa-floppy-disk"></i>
                        <span>Save Changes</span>
                    </button>
                </div>
            </div>

            <div class="profile-content">
                
                <div class="profile-section">
                    <div class="section-header">
                        <i class="fa-solid fa-user"></i> Personal Details
                    </div>
                    <div class="data-grid">
                        <div class="field-group full-width" data-field="fullName">
                            <label class="field-label">
                                <i class="fa-solid fa-user-tag"></i> Full Name
                            </label>
                            <div class="field-input-wrapper">
                                <input type="text" class="field-value" id="inputFullName" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon"></i>
                            </div>
                        </div>
                        <div class="field-group" data-field="email">
                            <label class="field-label">
                                <i class="fa-solid fa-envelope"></i> Email Address
                            </label>
                            <div class="field-input-wrapper">
                                <input type="email" class="field-value" id="inputEmail" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon"></i>
                            </div>
                        </div>
                        <div class="field-group password-field">
                            <label class="field-label">
                                <i class="fa-solid fa-lock"></i> Password
                            </label>
                            <div class="field-input-wrapper">
                                <input type="password" class="field-value" value="••••••••••••" disabled />
                                <i class="fa-solid fa-key field-edit-icon" style="display: block; cursor: pointer; pointer-events: auto;" id="openPasswordBtn"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="profile-section">
                    <div class="section-header">
                        <i class="fa-solid fa-briefcase"></i> Business Details
                    </div>
                    <div class="data-grid">
                        <div class="field-group" data-field="companyName">
                            <label class="field-label">
                                <i class="fa-solid fa-building"></i> Company Name
                            </label>
                            <div class="field-input-wrapper">
                                <input type="text" class="field-value" id="inputCompanyName" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon"></i>
                            </div>
                        </div>
                        <div class="field-group" data-field="traderType">
                            <label class="field-label">
                                <i class="fa-solid fa-store"></i> Trader Type
                            </label>
                            <div class="trader-type-display" id="traderTypeDisplay">
                                </div>
                        </div>
                        <div class="field-group">
                            <label class="field-label">
                                <i class="fa-solid fa-clock"></i> Business Hours
                            </label>
                            <div class="time-inputs">
                                <div class="time-wrapper">
                                    <input type="time" class="field-value" id="inputOpeningTime" disabled />
                                </div>
                                <span class="time-separator">to</span>
                                <div class="time-wrapper">
                                    <input type="time" class="field-value" id="inputClosingTime" disabled />
                                </div>
                            </div>
                        </div>
                        <div class="field-group" data-field="phone">
                            <label class="field-label">
                                <i class="fa-solid fa-phone"></i> Phone Number
                            </label>
                            <div class="field-input-wrapper">
                                <input type="tel" class="field-value" id="inputPhone" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon"></i>
                            </div>
                        </div>
                        <div class="field-group" data-field="whatsapp">
                            <label class="field-label">
                                <i class="fa-brands fa-whatsapp"></i> WhatsApp Number
                            </label>
                            <div class="field-input-wrapper">
                                <input type="tel" class="field-value" id="inputWhatsapp" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="profile-section">
                    <div class="section-header">
                        <i class="fa-solid fa-location-dot"></i> Location
                    </div>
                    <div class="data-grid">
                        <div class="field-group" data-field="region">
                            <label class="field-label">
                                <i class="fa-solid fa-map"></i> Region
                            </label>
                            <div class="field-input-wrapper">
                                <input type="text" class="field-value" id="inputRegion" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon"></i>
                            </div>
                        </div>
                        <div class="field-group" data-field="district">
                            <label class="field-label">
                                <i class="fa-solid fa-location-dot"></i> District
                            </label>
                            <div class="field-input-wrapper">
                                <input type="text" class="field-value" id="inputDistrict" disabled />
                                <i class="fa-solid fa-pen-to-square field-edit-icon"></i>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ===== FOOTER - Static bottom ===== -->
        <div class="profile-footer">
            <span></span>
            <span class="footer-center">All right reserved @2026</span>
            <span class="footer-right">v.1</span>
        </div>

    </div>

    <div class="modal-overlay" id="passwordModal">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title">Change Password</div>
                <button class="modal-close-btn" id="closePasswordX">&times;</button>
            </div>
            <div class="modal-form">
                <div class="field-group">
                    <label class="field-label">Current Password</label>
                    <input type="password" class="modal-input" id="currentPassword" placeholder="Enter current password" />
                </div>
                
                <div class="field-group">
                    <label class="field-label">New Password</label>
                    <input type="password" class="modal-input" id="newPassword" placeholder="Min 8 characters" disabled />
                </div>

                <div class="field-group">
                    <label class="field-label">Confirm New Password</label>
                    <input type="password" class="modal-input" id="confirmPassword" placeholder="Repeat new password" disabled />
                </div>
                <div class="error-text" id="confirmPasswordError">❌ Passwords do not match.</div>

                <div class="modal-actions">
                    <button class="btn-modal-cancel" id="closePasswordCancel">Cancel</button>
                    <button class="btn-modal-save" id="modalSaveBtn" disabled>Update Password</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // STATE
            let isEditMode = false;
            let isPasswordModalOpen = false;
            let currentPasswordCorrect = false;

            let userData = {
                fullName: 'Mudhihiri M. Selemani',
                email: 'mudhihirjz@trading.com',
                password: 'password123', 
                companyName: 'Mudhihirjz Tech',
                traderType: 'Retailer', 
                openingTime: '08:00',
                closingTime: '17:00',
                phone: '+255 712 345 678',
                whatsapp: '+255 712 345 678',
                region: 'Pwani',
                district: 'Bagamoyo',
                avatarUrl: '' 
            };

            // DOM ELEMENTS
            const toastContainer = document.getElementById('toastContainer');
            const profileContainer = document.getElementById('profileContainer');
            
            const editToggleBtn = document.getElementById('editToggleBtn');
            const editBtnText = document.getElementById('editBtnText');
            const saveChangesBtn = document.getElementById('saveChangesBtn');
            
            const avatarWrapper = document.getElementById('avatarWrapper');
            const avatarCircle = document.getElementById('avatarCircle');
            const avatarEditIcon = document.getElementById('avatarEditIcon');
            const avatarInput = document.getElementById('avatarInput');
            
            const sidebarName = document.getElementById('sidebarName');
            const sidebarRole = document.getElementById('sidebarRole');

            // Modal Elements
            const passwordModal = document.getElementById('passwordModal');
            const openPasswordBtn = document.getElementById('openPasswordBtn');
            const closePasswordX = document.getElementById('closePasswordX');
            const closePasswordCancel = document.getElementById('closePasswordCancel');
            const modalSaveBtn = document.getElementById('modalSaveBtn');
            
            const currentPassword = document.getElementById('currentPassword');
            const newPassword = document.getElementById('newPassword');
            const confirmPassword = document.getElementById('confirmPassword');
            const confirmPasswordError = document.getElementById('confirmPasswordError');

            // ============================================
            // TOAST ENGINE
            // ============================================
            function showToast(message, type = 'success') {
                hideToast(); 

                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `<span>${message}</span>`;
                toastContainer.appendChild(toast);

                setTimeout(() => {
                    toast.classList.add('show');
                }, 50);

                const autoHideTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400);
                }, 4000);

                toast.dataset.timeoutId = autoHideTimeout;
            }

            function hideToast() {
                const activeToasts = toastContainer.querySelectorAll('.toast');
                activeToasts.forEach(toast => {
                    if (toast.dataset.timeoutId) {
                        clearTimeout(parseInt(toast.dataset.timeoutId));
                    }
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400);
                });
            }

            // ============================================
            // DOM DATA SYNC
            // ============================================
            function updateFieldsFromData() {
                document.getElementById('inputFullName').value = userData.fullName;
                document.getElementById('inputEmail').value = userData.email;
                document.getElementById('inputCompanyName').value = userData.companyName;
                document.getElementById('inputOpeningTime').value = userData.openingTime;
                document.getElementById('inputClosingTime').value = userData.closingTime;
                document.getElementById('inputPhone').value = userData.phone;
                document.getElementById('inputWhatsapp').value = userData.whatsapp;
                document.getElementById('inputRegion').value = userData.region;
                document.getElementById('inputDistrict').value = userData.district;

                sidebarName.textContent = userData.fullName;
                sidebarRole.textContent = `${userData.traderType} Trader`;

                const badgeContainer = document.getElementById('traderTypeDisplay');
                const badgeClass = userData.traderType.toLowerCase() === 'retailer' ? 'retailer' : 'wholesale';
                badgeContainer.innerHTML = `<span class="badge ${badgeClass}">${userData.traderType}</span>`;

                updateAvatar();
            }

            function updateAvatar() {
                avatarCircle.innerHTML = '';
                if (userData.avatarUrl) {
                    const img = document.createElement('img');
                    img.src = userData.avatarUrl;
                    img.className = 'avatar-img';
                    img.alt = 'Avatar';
                    img.onerror = function() {
                        userData.avatarUrl = '';
                        renderPlaceholderAvatar();
                    };
                    avatarCircle.appendChild(img);
                } else {
                    renderPlaceholderAvatar();
                }
            }

            function renderPlaceholderAvatar() {
                avatarCircle.innerHTML = '';
                const placeholder = document.createElement('div');
                placeholder.className = 'avatar-placeholder';
                
                if (userData.fullName) {
                    const parts = userData.fullName.trim().split(/\s+/);
                    if (parts.length > 1) {
                        placeholder.textContent = (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
                    } else if (parts[0]) {
                        placeholder.textContent = parts[0][0].toUpperCase();
                    } else {
                        placeholder.textContent = 'U';
                    }
                } else {
                    placeholder.textContent = 'U';
                }
                avatarCircle.appendChild(placeholder);
            }

            // ============================================
            // PROFILE ACTIONS (EDIT / SAVE)
            // ============================================
            function toggleEditMode() {
                isEditMode = !isEditMode;

                if (isEditMode) {
                    saveChangesBtn.dataset.saved = 'false'; 

                    profileContainer.classList.add('edit-mode');
                    editToggleBtn.classList.add('editing');
                    editBtnText.textContent = 'Cancel Edit';

                    document.querySelectorAll('.field-group:not(.password-field) .field-value').forEach(input => {
                        input.disabled = false;
                    });

                    avatarEditIcon.style.display = 'flex';
                    showToast('✏️ Edit mode activated. Click fields to edit.', 'success');
                } else {
                    profileContainer.classList.remove('edit-mode');
                    editToggleBtn.classList.remove('editing');
                    editBtnText.textContent = 'Edit Profile';

                    document.querySelectorAll('.field-group:not(.password-field) .field-value').forEach(input => {
                        input.disabled = true;
                    });

                    avatarEditIcon.style.display = 'none';

                    if (saveChangesBtn.dataset.saved !== 'true') {
                        updateFieldsFromData();
                    }
                }
            }

            function saveProfileChanges() {
                const newData = {
                    fullName: document.getElementById('inputFullName').value,
                    email: document.getElementById('inputEmail').value,
                    phone: document.getElementById('inputPhone').value,
                    whatsapp: document.getElementById('inputWhatsapp').value,
                    companyName: document.getElementById('inputCompanyName').value,
                    region: document.getElementById('inputRegion').value,
                    district: document.getElementById('inputDistrict').value,
                    openingTime: document.getElementById('inputOpeningTime').value,
                    closingTime: document.getElementById('inputClosingTime').value
                };

                // Uhakiki wa msingi (Validation)
                if (!newData.fullName.trim()) {
                    showToast('⚠️ Full name is required.', 'error');
                    return;
                }
                if (!newData.email.trim() || !newData.email.includes('@')) {
                    showToast('⚠️ Please enter a valid email.', 'error');
                    return;
                }
                if (!newData.phone.trim()) {
                    showToast('⚠️ Phone number is required.', 'error');
                    return;
                }
                if (!newData.whatsapp.trim()) {
                    showToast('⚠️ WhatsApp number is required.', 'error');
                    return;
                }
                if (!newData.companyName.trim()) {
                    showToast('⚠️ Company name is required.', 'error');
                    return;
                }
                if (!newData.region.trim()) {
                    showToast('⚠️ Region is required.', 'error');
                    return;
                }
                if (!newData.district.trim()) {
                    showToast('⚠️ District is required.', 'error');
                    return;
                }

                // Uhakiki wa masaa ya duka (Business Hours)
                if (newData.openingTime >= newData.closingTime) {
                    showToast('⚠️ Closing time must be after opening time.', 'error');
                    return;
                }

                userData = { ...userData, ...newData };
                saveChangesBtn.dataset.saved = 'true';
                toggleEditMode();
                showToast('💾 Profile changes saved successfully!', 'success');
            }

            // ============================================
            // PASSWORD MODAL CONTROLLER
            // ============================================
            function openPasswordModal() {
                isPasswordModalOpen = true;
                passwordModal.classList.add('active');
                currentPassword.value = '';
                newPassword.value = '';
                confirmPassword.value = '';
                
                currentPassword.className = 'modal-input';
                newPassword.className = 'modal-input';
                confirmPassword.className = 'modal-input';
                
                newPassword.disabled = true;
                confirmPassword.disabled = true;
                modalSaveBtn.disabled = true;
                confirmPasswordError.classList.remove('show');
                
                // Reset verification state
                currentPasswordCorrect = false;
                
                setTimeout(() => currentPassword.focus(), 100);
            }

            function closePasswordModal() {
                isPasswordModalOpen = false;
                passwordModal.classList.remove('active');
                currentPasswordCorrect = false;

                // Safisha madarasa yote kuzuia ghost visual effects
                currentPassword.className = 'modal-input';
                newPassword.className = 'modal-input';
                confirmPassword.className = 'modal-input';
                newPassword.disabled = true;
                confirmPassword.disabled = true;
                modalSaveBtn.disabled = true;
                confirmPasswordError.classList.remove('show');
            }

            function validateCurrentPassword() {
                if (currentPassword.value === userData.password) {
                    currentPasswordCorrect = true;
                    currentPassword.className = 'modal-input success-input';
                    newPassword.disabled = false;
                    confirmPassword.disabled = false;
                    showToast('🔒 Current password verified.', 'success');
                    newPassword.focus();
                } else {
                    currentPasswordCorrect = false;
                    currentPassword.className = 'modal-input error';
                    newPassword.disabled = true;
                    confirmPassword.disabled = true;
                    modalSaveBtn.disabled = true;
                    showToast('❌ Incorrect current password.', 'error');
                }
            }

            function checkPasswordsMatch() {
                const newPwd = newPassword.value;
                const confirmPwd = confirmPassword.value;

                if (confirmPwd.length > 0 && newPwd !== confirmPwd) {
                    confirmPasswordError.classList.add('show');
                    confirmPassword.className = 'modal-input error';
                    modalSaveBtn.disabled = true;
                } else if (newPwd.length >= 8 && newPwd === confirmPwd && currentPasswordCorrect) {
                    confirmPasswordError.classList.remove('show');
                    confirmPassword.className = 'modal-input success-input';
                    modalSaveBtn.disabled = false;
                } else {
                    confirmPasswordError.classList.remove('show');
                    if (confirmPwd.length > 0) {
                        confirmPassword.className = 'modal-input';
                    }
                    // SECURITY FIX: Button ONLY enabled if ALL conditions are met
                    if (currentPasswordCorrect && newPwd.length >= 8 && newPwd === confirmPwd && confirmPwd.length > 0) {
                        modalSaveBtn.disabled = false;
                    } else {
                        modalSaveBtn.disabled = true;
                    }
                }
            }

            function saveNewPassword() {
                if (currentPasswordCorrect && newPassword.value.length >= 8 && newPassword.value === confirmPassword.value) {
                    userData.password = newPassword.value;
                    closePasswordModal();
                    showToast('🔑 Password updated successfully!', 'success');
                } else {
                    showToast('⚠️ Please check your password inputs.', 'error');
                }
            }

            // ============================================
            // EVENT LISTENERS REGISTER
            // ============================================
            
            // Edit Mode Events
            editToggleBtn.addEventListener('click', toggleEditMode);
            saveChangesBtn.addEventListener('click', saveProfileChanges);

            // Field Focus Redirect Engine
            document.querySelectorAll('.field-group:not(.password-field)').forEach(group => {
                group.addEventListener('click', function(e) {
                    if (isEditMode && !e.target.closest('.field-value') && this.dataset.field !== 'traderType') {
                        const input = this.querySelector('.field-value');
                        if (input && !input.disabled) {
                            input.focus();
                            input.select();
                        }
                    }
                });
            });

            // Avatar Change Engine
            avatarWrapper.addEventListener('click', () => {
                if (isEditMode) avatarInput.click();
            });

            avatarInput.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) {
                        showToast('⚠️ Image size must be less than 2MB.', 'error');
                        this.value = '';
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        userData.avatarUrl = e.target.result;
                        updateAvatar();
                        showToast('🖼️ Avatar uploaded in preview.', 'success');
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Password Modal Trigger Events
            openPasswordBtn.addEventListener('click', openPasswordModal);
            closePasswordX.addEventListener('click', closePasswordModal);
            closePasswordCancel.addEventListener('click', closePasswordModal);
            modalSaveBtn.addEventListener('click', saveNewPassword);

            // SECURITY FIX: Current password validation
            // Method 1: Auto-verify as user types
            currentPassword.addEventListener('input', function() {
                if (this.value === userData.password) {
                    currentPasswordCorrect = true;
                    currentPassword.className = 'modal-input success-input';
                    newPassword.disabled = false;
                    confirmPassword.disabled = false;
                    // Check if new password already has values
                    if (newPassword.value.length >= 8 && confirmPassword.value === newPassword.value) {
                        checkPasswordsMatch();
                    }
                } else {
                    currentPasswordCorrect = false;
                    currentPassword.className = 'modal-input';
                    newPassword.disabled = true;
                    confirmPassword.disabled = true;
                    modalSaveBtn.disabled = true;
                }
            });

            // Method 2: Enter key
            currentPassword.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    validateCurrentPassword();
                }
            });

            // Method 3: Blur event - but only validate if there's content
            currentPassword.addEventListener('blur', function() {
                if (this.value.trim() && this.value !== userData.password) {
                    // Show error only if they typed something wrong
                    currentPassword.className = 'modal-input error';
                    showToast('❌ Incorrect current password.', 'error');
                } else if (this.value.trim() && this.value === userData.password) {
                    currentPasswordCorrect = true;
                    currentPassword.className = 'modal-input success-input';
                    newPassword.disabled = false;
                    confirmPassword.disabled = false;
                }
            });

            newPassword.addEventListener('input', checkPasswordsMatch);
            confirmPassword.addEventListener('input', checkPasswordsMatch);

            // Keyboard Shortcuts Control (Escape / Ctrl + S)
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isPasswordModalOpen) {
                    closePasswordModal();
                }
                if (e.key === 'Escape' && isEditMode && !isPasswordModalOpen) {
                    toggleEditMode();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    if (isEditMode && !isPasswordModalOpen) {
                        saveProfileChanges();
                    }
                }
            });

            // ============================================
            // INITIALIZATION
            // ============================================
            function init() {
                updateFieldsFromData();
                avatarEditIcon.style.display = 'none';

                setTimeout(() => {
                    showToast('👋 Welcome to your profile!', 'success');
                }, 300);

                const params = new URLSearchParams(window.location.search);
                const role = params.get('role') || 'User';
                if (role) {
                    setTimeout(() => {
                        showToast(`👋 Welcome ${role}!`, 'success');
                    }, 100);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            window.addEventListener('beforeunload', function() {
                hideToast();
            });

        })();
    </script>
</body>
</html>
